<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>前一天国内新闻日报 2026-06-03</title>
  <style>
    :root {
      --bg: #f5ecdd;
      --paper: rgba(255, 252, 247, 0.92);
      --ink: #1f1a16;
      --muted: #6d6156;
      --accent: #9f1d2c;
      --accent-soft: #f2e2cf;
      --border: #decfbd;
      --shadow: 0 24px 64px rgba(88, 60, 41, 0.1);
    }
    body {
      margin: 0;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(159, 29, 44, 0.1), transparent 25%),
        radial-gradient(circle at bottom right, rgba(207, 162, 98, 0.16), transparent 25%),
        linear-gradient(180deg, #fbf4ea, #f1e5d4);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 18px 56px;
    }
    .shell {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: clamp(32px, 5vw, 52px);
    }
    .meta {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .report-section + .report-section {
      margin-top: 18px;
    }
    .report-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }
    .report-head h2 {
      margin: 0;
      font-size: 30px;
    }
    .report-head span {
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .article-card, .study-card {
      background: #fbf6ee;
      border: 1px solid #e4d7c8;
      border-radius: 20px;
      padding: 18px;
    }
    .article-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .article-card h3, .study-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.45;
    }
    a {
      color: #1f2b7b;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    p {
      margin: 0;
      line-height: 1.8;
    }
    .study-wrap {
      margin-top: 28px;
      display: grid;
      gap: 16px;
    }
    .study-breakdown ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
    .empty {
      color: var(--muted);
    }
    @media (max-width: 720px) {
      main {
        padding: 22px 12px 40px;
      }
      .shell {
        padding: 18px;
        border-radius: 20px;
      }
      .report-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .report-head h2 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <h1>前一天国内新闻日报</h1>
      <div class="meta">日期：2026-06-03 | 生成时间：2026-06-04T08:55:01.827303+08:00</div>
      
            <section class="report-section">
              <div class="report-head">
                <h2>重要时政</h2>
                <span>0 条</span>
              </div>
              <div class="article-grid"><p class='empty'>暂无内容</p></div>
            </section>
            
            <section class="report-section">
              <div class="report-head">
                <h2>政策发布</h2>
                <span>0 条</span>
              </div>
              <div class="article-grid"><p class='empty'>暂无内容</p></div>
            </section>
            
            <section class="report-section">
              <div class="report-head">
                <h2>地方热点</h2>
                <span>0 条</span>
              </div>
              <div class="article-grid"><p class='empty'>暂无内容</p></div>
            </section>
            
            <section class="report-section">
              <div class="report-head">
                <h2>评论文章</h2>
                <span>0 条</span>
              </div>
              <div class="article-grid"><p class='empty'>暂无内容</p></div>
            </section>
            
      <section class="study-wrap">
        <div class="report-head">
          <h2>申论学习提炼</h2>
          <span>0 条</span>
        </div>
        <p class='empty'>暂无学习提炼</p>
      </section>
    </section>
  </main>
</body>
</html>
